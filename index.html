<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cycle Routes</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="main-container">
        <button id="toggle-btn" onclick="toggleSidebar()">☰</button>
        <div id="sidebar" class="sidebar">
            <button id="clear-btn">Reset View</button>
            <h2><ion-icon name="bicycle"></ion-icon> Routes</h2>
            <!-- Search and Filter Inputs -->
            <div class="filter-controls">
                <div class="filter-controls">
                    <button onclick="sortList('name')">Sort by Name</button>
                    <button onclick="sortList('distance')">Sort by Distance</button>
                </div>
                <!--<input type="text" id="search-input" placeholder="Search by name..." onkeyup="filterRoutes()">
                <br>
                <label for="length-slider">Max Distance: <span id="range-val">50</span> km</label>
                <input type="range" id="length-slider" min="0" max="100" value="100" oninput="filterRoutes()">-->
            </div>
            <ul id="route-list"></ul>
        </div>
        <div id="map"></div>
    </div>
    <!-- 
    ## Todo:
    - Add filter for distance and date
    - Does github pages support ? links in URIs? If so, add a ?info=clifton_loop to the url and show the info for that route on page load.
    - Use leaflet.markercluster to combine close pins
    -->

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- 1. Include the Leaflet GPX Plugin from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/2.2.0/gpx.js" integrity="sha512-ajVJ/Mbznhd2lAlUsjRuTlrfSG1uY6qAdD6rqDJJHwhgKhReJGwhqEcwPJo0yaF1AcyCdtZs4oKNV9g/SonrJw==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script>
        let allRoutes = [];
        let activeGpxTrack = null; // Track the current visible route

        const map = L.map('map').setView([50.94,-2.56], 9);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        const markerIcon = L.divIcon({
        html: '<ion-icon name="location-sharp" style="font-size: 32px; color: #6F2DA8;"></ion-icon>',
        className: 'custom-div-icon', // Use this to remove default Leaflet styling
        iconSize: [32, 32],          // Match this to your font-size
        iconAnchor: [16, 32]         // Point of the icon that corresponds to marker's location
        });

        const startIcon = L.divIcon({
        html: '<ion-icon name="location-sharp"  style="font-size: 32px; color: green;"></ion-icon>',
        className: 'custom-div-icon', // Use this to remove default Leaflet styling
        iconSize: [32, 32],          // Match this to your font-size
        iconAnchor: [16, 32]         // Point of the icon that corresponds to marker's location
        });
        
        const endIcon = L.divIcon({
        html: '<ion-icon name="pin-sharp" style="font-size: 32px; color: red;"></ion-icon>',
        className: 'custom-div-icon', // Use this to remove default Leaflet styling
        iconSize: [32, 32],          // Match this to your font-size
        iconAnchor: [16, 32]         // Point of the icon that corresponds to marker's location
        });

        const zoomToTrack = (track) => {
            const sidebar = document.getElementById('sidebar');
            const isSidebarVisible = !sidebar.classList.contains('sidebar-hidden');
            const isMobile = window.innerWidth < 768;

            map.fitBounds(track.getBounds(), {
                // If mobile + visible, sidebar covers map, so add top padding
                // If desktop + visible, flexbox handles it, so standard padding
                paddingTopLeft: (isMobile && isSidebarVisible) ? [10, 50] : [50, 50],
                paddingBottomRight: [10, 10],
                maxZoom: 15,
                animate: true
            });
            
            // Close sidebar on mobile so user can see the route they just clicked
            if (isMobile) toggleSidebar();
        };

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('sidebar-hidden');

            // Wait for the 0.4s CSS transition to finish before refreshing the map
            setTimeout(() => {
                map.invalidateSize({ pan: true });
            }, 400); 
        }

        function sortList(criteria) {
            const list = document.getElementById('route-list');
            const items = Array.from(list.children); // Convert NodeList to Array for sorting

            items.sort((a, b) => {
                if (criteria === 'name') {
                    const nameA = a.getAttribute('data-name').toLowerCase();
                    const nameB = b.getAttribute('data-name').toLowerCase();
                    return nameA.localeCompare(nameB); // Alphabetical sort
                } else {
                    const distA = parseFloat(a.getAttribute('data-distance'));
                    const distB = parseFloat(b.getAttribute('data-distance'));
                    return distA - distB; // Numerical sort
                }
            });

            // Re-append items in the new order
            items.forEach(item => list.appendChild(item));
        }

        function formatFutureDate(dateStr) {
            if (!dateStr) return '';
            const routeDate = new Date(dateStr);
            const now = new Date();
            
            // Check if the date is valid and in the future
            if (!isNaN(routeDate) && routeDate > now) {
                return `<br><span style="color: #6F2DA8; font-weight: bold;">📅 ${routeDate.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' })}</span>`;
            }
            return '';
        }

        function loadRoute(loc, shouldZoom = false) {
            // Don't reload if this specific route is already showing


            if (activeGpxTrack && activeGpxTrack._gpxFile === loc.gpx) {
                if (shouldZoom) zoomToTrack(activeGpxTrack);
                return;
            }

            if (activeGpxTrack) map.removeLayer(activeGpxTrack);

            activeGpxTrack = new L.GPX(`routes/${loc.gpx}`, {
                async: true,
                markers: { startIcon, endIcon, shadowIcon: null },
                polyline_options: { color: '#6F2DA8', weight: 3 }
            }).addTo(map);

            activeGpxTrack._gpxFile = loc.gpx;

            if (shouldZoom) {
                activeGpxTrack.on('loaded', (e) => zoomToTrack(e.target));
            }
        }

        // Clear Button Logic
        document.getElementById('clear-btn').onclick = () => {
            if (activeGpxTrack) {
                map.removeLayer(activeGpxTrack);
                activeGpxTrack = null;
            }
            map.closePopup();
            map.setView([50.94, -2.56], 9);
            // On mobile, close sidebar after clearing for better UX
            if (window.innerWidth < 768) {
                const sidebar = document.getElementById('sidebar');
                if (!sidebar.classList.contains('sidebar-hidden')) toggleSidebar();
            }
        };

        fetch('routes.json')
            .then(response => response.json())
            .then(locations => {
                allLocations = locations; // Save to global variable
                const listContainer = document.getElementById('route-list');                
                let activeGpxTrack = null;

                locations.forEach(loc => {
                    const dateHtml = formatFutureDate(loc.date);
                    const marker = L.marker(loc.coords, { 
                        icon: markerIcon,
                        zIndexOffset: 1000,
                        riseOnHover: true   
                    }).addTo(map);
                    
                    marker.bindPopup(`
                        <b>${loc.name}</b>${dateHtml}<br>
                        <small>${loc.distance_km} km | ${loc.elevation_gain_m} m</small><br>
                        ${loc.description ? loc.description + '<br>' : ''}
                        ${loc.author ? (loc.author_website ? '<a href="' + loc.author_website + '" target="_blank">' + loc.author + '</a><br>' : loc.author + '<br>') : ''}
                    `);
                    // --- Interaction Logic ---
                    // On Mobile: First tap triggers mouseover (loads route)
                    marker.on('mouseover', () => loadRoute(loc, false));
                    // On Desktop & Mobile: Clicking marker or sidebar zooms in
                    marker.on('click', () => loadRoute(loc, true));

                    const listItem = document.createElement('li');
                    listItem.innerHTML = `<strong>${loc.name}</strong><br><small>${loc.distance_km} km</small>`;
                    listItem.style.cursor = "pointer";
                    listItem.style.marginBottom = "10px";
                    listItem.setAttribute('data-name', loc.name);
                    listItem.setAttribute('data-distance', loc.distance_km);
                    listItem.setAttribute('data-date', loc.date || '1970-01-01');
                    listItem.onclick = () => {
                        loadRoute(loc, true); 
                        // Give the user a split second to see the click before sidebar slides away
                        if (window.innerWidth < 768) {
                            setTimeout(toggleSidebar, 300);
                        }
                    };
                    listContainer.appendChild(listItem);
                });
                const params = new URLSearchParams(window.location.search);
                const routeId = params.get('info');
                if (routeId) {
                    const target = allLocations.find(l => l.gpx.replace('.gpx', '') === routeId);
                    if (target) loadRoute(target, true);
                }
            })
            .catch(error => console.error('Error loading map data:', error));

    </script>
</body>
</html>
