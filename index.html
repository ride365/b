<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cycle Routes</title>
    <link rel="icon" type="image/svg+xml" href="assets/map.svg">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="main-container">
        <button id="toggle-btn" onclick="toggleSidebar()">☰</button>
        <div id="sidebar" class="sidebar">
            <button id="clear-btn"><ion-icon name="refresh" style="color: #fff;"></ion-icon> Reset View</button>
            <h2><ion-icon name="bicycle"></ion-icon> Routes</h2>
            <!-- Search and Filter Inputs -->
            <div class="filter-controls">
                <div class="filter-controls">
                    <button onclick="sortList('name')">Sort by Name</button>
                    <button id="dist-sort-btn" onclick="sortList('distance')">Sort by Distance</button>
                </div>
                <!--<input type="text" id="search-input" placeholder="Search by name..." onkeyup="filterRoutes()">
                <br>
                <label for="length-slider">Max Distance: <span id="range-val">50</span> km</label>
                <input type="range" id="length-slider" min="0" max="100" value="100" oninput="filterRoutes()">-->
            </div>
            <ul id="route-list"></ul>
        </div>
        <div id="map"></div>
    </div>
    <!-- 
    ## Todo:
    - Add filter for distance and date
    - Does github pages support ? links in URIs? If so, add a ?info=clifton_loop to the url and show the info for that route on page load.
    - Use leaflet.markercluster to combine close pins
    - add surface type to routes.json, added related icons and filter
    - when clicking route in list, the popup should appear for that route
    - when the route disappears as mouseover another route, the old popup should disappear
    -->

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- 1. Include the Leaflet GPX Plugin from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/2.2.0/gpx.js" integrity="sha512-ajVJ/Mbznhd2lAlUsjRuTlrfSG1uY6qAdD6rqDJJHwhgKhReJGwhqEcwPJo0yaF1AcyCdtZs4oKNV9g/SonrJw==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script>
        let allRoutes = [];
        let activeGpxTrack = null; // Track the current visible route
        let distSortDirection = 'desc';

        const map = L.map('map').setView([50.94,-2.56], 9);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        const createIcon = (name, color, size) => L.divIcon({
            html: `<ion-icon name="${name}" style="font-size: ${size}px; color: ${color};"></ion-icon>`,
            className: 'custom-div-icon',
            iconSize: [size, size],
            iconAnchor: [size / 2, size]
        });

        const markerIcon = createIcon('location-sharp', '#6F2DA8', 25);
        const startIcon  = createIcon('pin-sharp', 'green', 16);
        const endIcon    = createIcon('pin-sharp',      'red', 16);
        const alertIcon  = createIcon('alert-circle',  'grey', 16);

        const zoomToTrack = (track) => {
            const sidebar = document.getElementById('sidebar');
            const isSidebarVisible = !sidebar.classList.contains('sidebar-hidden');
            const isMobile = window.innerWidth < 768;

            map.fitBounds(track.getBounds(), {
                // If mobile + visible, sidebar covers map, so add top padding
                // If desktop + visible, flexbox handles it, so standard padding
                paddingTopLeft: (isMobile && isSidebarVisible) ? [10, 50] : [50, 50],
                paddingBottomRight: [10, 10],
                maxZoom: 15,
                animate: true
            });
            
            // Close sidebar on mobile so user can see the route they just clicked
            if (isMobile && isSidebarVisible) toggleSidebar();
        };

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('sidebar-hidden');

            // Wait for the 0.4s CSS transition to finish before refreshing the map
            setTimeout(() => {
                map.invalidateSize({ pan: true });
            }, 400); 
        }

        function sortList(criteria) {
            const list = document.getElementById('route-list');
            const items = Array.from(list.children);
            const btn = document.getElementById('dist-sort-btn'); // Add this ID to your HTML button

            items.sort((a, b) => {
                if (criteria === 'name') {
                    return a.getAttribute('data-name').localeCompare(b.getAttribute('data-name'));
                } else if (criteria === 'distance') {
                    const distA = parseFloat(a.getAttribute('data-distance'));
                    const distB = parseFloat(b.getAttribute('data-distance'));
                    
                    // Flip logic based on current direction
                    return distSortDirection === 'asc' ? distA - distB : distB - distA;
                }
            });

            // Toggle direction and update button text for next click
            if (criteria === 'distance') {
                distSortDirection = distSortDirection === 'asc' ? 'desc' : 'asc';
                btn.innerText = distSortDirection === 'asc' ? 'Sort: Longest First' : 'Sort: Shortest First';
            }

            items.forEach(item => list.appendChild(item));
        }

        function formatFutureDate(dateStr) {
            if (!dateStr) return '';
            const routeDate = new Date(dateStr);
            const now = new Date();
            
            // Check if the date is valid and in the future
            if (!isNaN(routeDate) && routeDate > now) {
                return `<span class="event-date">📅 ${routeDate.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' })}</span>`;
            }
            return '';
        }

        function loadRoute(loc, shouldZoom = false) {
            // Don't reload if this specific route is already showing


            if (activeGpxTrack && activeGpxTrack._gpxFile === loc.gpx) {
                if (shouldZoom) zoomToTrack(activeGpxTrack);
                return;
            }

            if (activeGpxTrack) map.removeLayer(activeGpxTrack);

            activeGpxTrack = new L.GPX(`routes/${loc.gpx}`, {
                async: true,
                markers: { 
                    startIcon,
                    endIcon, 
                    shadowIcon: null,
                    wptIcons: {
                        'Dot': createIcon('ellipse', 'blue'),
                        'generic': markerIcon
                    },
                    pointMatchers: [
                        { regex: /Divert/i, icon: alertIcon }
                    ]
                },
                polyline_options: { color: '#6F2DA8', weight: 3 }
            }).addTo(map);

            activeGpxTrack._gpxFile = loc.gpx;

            if (shouldZoom) {
                activeGpxTrack.on('loaded', (e) => zoomToTrack(e.target));
            }
        }

        function loadRouteByGpx(filename) {
            // Find the specific route data inside your nested allLocations global
            let foundRoute = null;
            allLocations.forEach(loc => {
                loc.events.forEach(event => {
                    event.variants.forEach(v => {
                        if (v.gpx === filename) foundRoute = v;
                    });
                });
            });

            if (foundRoute) {
                loadRoute(foundRoute, true); // Use your existing loadRoute function
            }
        }

        // Clear Button Logic
        document.getElementById('clear-btn').onclick = () => {
            if (activeGpxTrack) {
                map.removeLayer(activeGpxTrack);
                activeGpxTrack = null;
            }
            map.closePopup();
            map.eachLayer(function (layer) {
                if (layer.closePopup) layer.closePopup();
            });
            map.setView([50.94, -2.56], 9);
            // On mobile, close sidebar after clearing for better UX
            if (window.innerWidth < 768) {
                const sidebar = document.getElementById('sidebar');
                if (!sidebar.classList.contains('sidebar-hidden')) toggleSidebar();
            }
        };

        fetch('routes.json')
            .then(response => response.json())
            .then(locations => {
                allLocations = locations; // Save to global variable
                const now = new Date();
                const listContainer = document.getElementById('route-list');
                listContainer.innerHTML = ''; 

                // 1. SORTING: Sort by the date of the first event at each location
                locations.sort((a, b) => {
                    const dateA = a.events[0]?.variants[0]?.date ? new Date(a.events[0].variants[0].date) : null;
                    const dateB = b.events[0]?.variants[0]?.date ? new Date(b.events[0].variants[0].date) : null;
                    const isFutureA = dateA && dateA > now;
                    const isFutureB = dateB && dateB > now;

                    if (isFutureA && !isFutureB) return -1;
                    if (!isFutureA && isFutureB) return 1;
                    if (isFutureA && isFutureB) return dateA - dateB;
                    return a.events[0].event_name.localeCompare(b.events[0].event_name);
                });

      
                // let activeGpxTrack = null;

                locations.forEach(loc => {
                    
                    //const dateHtml = formatFutureDate(loc.date);
                    const marker = L.marker(loc.coords, { 
                        icon: markerIcon,
                        zIndexOffset: 1000,
                        riseOnHover: true   
                    }).addTo(map);
                    
                    // 2. POPUP HTML: Loop through Events then Variants
                    let popupHtml = `<div style="max-height:300px; overflow-y:auto; min-width:200px;">`;
                    
                    loc.events.forEach(event => {
                        popupHtml += `<div style="margin-bottom:10px; border-bottom:1px solid #eee; padding-bottom:5px;">
                            <strong>${event.event_name}</strong><br>`;
                        
                        event.variants.forEach(v => {
                            const dateHtml = formatFutureDate(v.date);
                            popupHtml += `
                                <div style="margin-top:4px;">
                                    <a href="#" onclick="loadRouteByGpx('${v.gpx}'); return false;" style="text-decoration:none;">
                                        🏃 ${v.variant_label} (${v.distance_km}km)
                                    </a> ${dateHtml}
                                </div>`;
                        });
                        popupHtml += `</div>`;
                    });
                    popupHtml += `</div>`;
                    marker.bindPopup(popupHtml);

                    marker.on('mouseover', () => loadRoute(loc, false));
                    // On Desktop & Mobile: Clicking marker or sidebar zooms in
                    marker.on('click', () => loadRoute(loc, true));

                    // 3. SIDEBAR HTML: Add each event separately to the sidebar list
                    loc.events.forEach(event => {
                        const mainVariant = event.variants[0];
                        const dateHtml = formatFutureDate(mainVariant.date);
                        
                        const listItem = document.createElement('li');
                        listItem.className = "route-item";
                        listItem.innerHTML = `
                            <strong>${event.event_name}</strong><br>
                            <small>${event.distance_range}</small> ${dateHtml}`;
                        
                        listItem.onclick = () => {
                            map.setView(loc.coords, 14);
                            marker.openPopup();
                        };
                        listContainer.appendChild(listItem);
                });
                const params = new URLSearchParams(window.location.search);
                const routeId = params.get('info');
                if (routeId) {
                    const target = allLocations.find(l => l.gpx.replace('.gpx', '') === routeId);
                    if (target) loadRoute(target, true);
                }
                });
            })
            .catch(error => console.error('Error loading map data:', error));
    </script>
</body>
</html>
