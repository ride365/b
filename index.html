<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cycle Routes</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <!-- Ionicons or other icon CSS -->
    <script type="module" src="https://unpkg.com/ionicons@4.5.10-0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule="" src="https://unpkg.com/ionicons@4.5.10-0/dist/ionicons/ionicons.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        .main-container {
            display: flex;
            height: 100vh; /* 100% of Viewport Height */
            width: 100vw;
        }

        .sidebar {
            width: 300px;
            background: #f8f9fa;
            border-right: 1px solid #ddd;
            overflow-y: auto;
            padding: 15px;
        }

        #map {
            flex-grow: 1; /* Map takes remaining space */
            height: 100%;
        }

        /* MOBILE VIEW: Hide sidebar if screen is less than 768px wide */
        @media (max-width: 767px) {
            .sidebar {
                display: none;
            }
        }

        body {
            background-color: hsla(64.7, 100%, 60.5%, 0.38);
        }

        .custom-pin {
            background-color: #e74c3c; /* Red */
            border-radius: 50% 50% 50% 0;
            width: 30px;
            height: 30px;
            transform: rotate(-45deg);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #c0392b;
        }

        .custom-pin i {
            color: white;
            transform: rotate(45deg); /* Un-rotate the icon */
            font-size: 18px;
        }

        .filter-controls {
            padding-bottom: 15px;
            border-bottom: 1px solid #ddd;
            margin-bottom: 15px;
        }
        #search-input {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }
        #length-slider {
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div id="sidebar" class="sidebar">
            <h2>Routes</h2>
            <!-- Search and Filter Inputs -->
            <div class="filter-controls">
                <input type="text" id="search-input" placeholder="Search by name..." onkeyup="filterRoutes()">
                <br>
                <label for="length-slider">Max Distance: <span id="range-val">50</span> km</label>
                <input type="range" id="length-slider" min="0" max="100" value="100" oninput="filterRoutes()">
            </div>
            <ul id="route-list"></ul>
        </div>
        <div id="map"></div>
    </div>
    <!-- 
    # Get distance from all gpx files and add to json
    # Add filter for distance and date
    # Add meta data to gpx files - website, date, strava link, etc.
    # Does github pages support ? links in URIs? If so, add a ?info=clifton_loop to the url and show the info for that route on page load.
    # Tweak hover action and click action.
    # Use leaflet.markercluster to combine close pins
    -->
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- 1. Include the Leaflet GPX Plugin from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/2.2.0/gpx.js" integrity="sha512-ajVJ/Mbznhd2lAlUsjRuTlrfSG1uY6qAdD6rqDJJHwhgKhReJGwhqEcwPJo0yaF1AcyCdtZs4oKNV9g/SonrJw==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script>
        const map = L.map('map').setView([50.94,-2.56], 9);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);
        const redMarker = L.divIcon({
            className: 'custom-pin', // We'll style this in CSS
            html: `<i class="ion-pizza"></i>`, // Your ionicon
            iconSize: [30, 30],
            iconAnchor: [15, 30] // Points the bottom-center of the icon to the coord
        });
        let allRoutes = [];
        // Load the JSON data
        fetch('routes.json')
            .then(response => response.json())
            .then(locations => {
                const listContainer = document.getElementById('route-list');
                locations.forEach(loc => {
                    // Prepare GPX track (hidden)
                    const gpxTrack = new L.GPX(`routes/${loc.gpx}`, {
                        async: true,
                        marker_options: { startIcon: null, endIcon: redMarker},
                        polyline_options: { color: '#EE82EE', weight: 4 }
                    });

                    // Create marker for this location
                    const marker = L.marker(loc.coords).addTo(map);
                    marker.bindPopup(`<b>${loc.name}</b><br>${loc.info}`);

                    // Hover interactions
                    marker.on('mouseover', () => gpxTrack.addTo(map));
                    marker.on('mouseout', () => map.removeLayer(gpxTrack));

                    // Create Sidebar Entry
                    const listItem = document.createElement('li');
                    listItem.innerHTML = `<strong>${loc.name}</strong><br><small>${loc.distance}</small>`;
                    listItem.style.cursor = "pointer";
                    listItem.style.marginBottom = "10px";
                    
                    // Interaction: Clicking sidebar name zooms map and opens popup
                    listItem.onclick = () => {
                        // Clear previous GPX tracks
                        map.eachLayer(layer => { if(layer instanceof L.GPX) map.removeLayer(layer); });

                        // Function to handle the actual zooming
                        const zoomToRoute = (track) => {
                            const bounds = track.getBounds();
                            const center = bounds.getCenter(); // Automatically finds the middle of the route

                            // 1. Force the map to fly to the center of the route
                            // This guarantees movement even if the point is close
                            map.flyTo(center, 14, {
                                animate: true,
                                duration: 0.5 // Half a second animation
                            });

                            // 2. Adjust zoom to fit the whole path perfectly
                            map.fitBounds(bounds, {
                                padding: [30, 30],
                                maxZoom: 15
                            });

                            marker.openPopup();
                        };

                        gpxTrack.addTo(map);

                        // If already loaded, zoom now. Otherwise, wait for the event.
                        if (gpxTrack.getBounds().isValid()) {
                            zoomToRoute(gpxTrack);
                        } else {
                            gpxTrack.on('loaded', (e) => zoomToRoute(e.target));
                        }
                    };

                    listContainer.appendChild(listItem);
                });
            })
            .catch(error => console.error('Error loading map data:', error));
    </script>
</body>
</html>
