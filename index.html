<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cycle Routes</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        .main-container {
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden; /* Prevent scrollbars during animation */
        }

        .sidebar {
            width: 300px;
            background: #f8f9fa;
            border-right: 1px solid #ddd;
            overflow-y: auto;
            padding: 15px;
            /* SMOOTH TRANSITION */
            transition: margin-left 0.4s ease-in-out;
        }

        /* Class to hide the sidebar */
        .sidebar-hidden {
            /* display: none !important; */
            margin-left: -330px;
        }
        
        #map {
            flex-grow: 1; /* Map takes remaining space */
            height: 100%;
        }

        /* MOBILE VIEW: Hide sidebar if screen is less than 768px wide */
        @media (max-width: 767px) {
            .sidebar {
                display: none;
            }
        }

        .custom-pin {
            background-color: #e74c3c; /* Red */
            border-radius: 50% 50% 50% 0;
            width: 30px;
            height: 30px;
            transform: rotate(-45deg);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #c0392b;
        }

        .custom-pin i {
            color: white;
            transform: rotate(45deg); /* Un-rotate the icon */
            font-size: 18px;
        }

        .filter-controls {
            padding-bottom: 15px;
            border-bottom: 1px solid #ddd;
            margin-bottom: 15px;
        }
        #search-input {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }
        #length-slider {
            width: 100%;
        }
        #toggle-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000; /* Ensure it stays above the map */
            padding: 8px 12px;
            background: white;
            border: 1px solid #ccc;
            border-radius: 4px;
            cursor: pointer;
        }
        ion-icon {
            color: #6F2DA8;
        }

        .custom-div-icon {
            background: none !important;
            border: none !important;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <button id="toggle-btn" onclick="toggleSidebar()">☰</button>
        <div id="sidebar" class="sidebar">
            <h2><ion-icon name="heart"></ion-icon> Routes</h2>
            <!-- Search and Filter Inputs -->
            <div class="filter-controls">
                <input type="text" id="search-input" placeholder="Search by name..." onkeyup="filterRoutes()">
                <br>
                <label for="length-slider">Max Distance: <span id="range-val">50</span> km</label>
                <input type="range" id="length-slider" min="0" max="100" value="100" oninput="filterRoutes()">
            </div>
            <ul id="route-list"></ul>
        </div>
        <div id="map"></div>
    </div>
    <!-- 
    # Get distance from all gpx files and add to json
    # Add filter for distance and date
    # Does github pages support ? links in URIs? If so, add a ?info=clifton_loop to the url and show the info for that route on page load.
    # Tweak hover action and click action.
    # Use leaflet.markercluster to combine close pins
    -->

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- 1. Include the Leaflet GPX Plugin from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/2.2.0/gpx.js" integrity="sha512-ajVJ/Mbznhd2lAlUsjRuTlrfSG1uY6qAdD6rqDJJHwhgKhReJGwhqEcwPJo0yaF1AcyCdtZs4oKNV9g/SonrJw==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('sidebar-hidden');

            // Wait for the 0.4s CSS transition to finish before refreshing the map
            setTimeout(() => {
                map.invalidateSize({ pan: true });
            }, 400); 
        }

        const map = L.map('map').setView([50.94,-2.56], 9);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);
        const markerIcon = L.divIcon({
        html: '<ion-icon name="location-sharp" style="font-size: 32px; color: #6F2DA8;"></ion-icon>',
        className: 'custom-div-icon', // Use this to remove default Leaflet styling
        iconSize: [32, 32],          // Match this to your font-size
        iconAnchor: [16, 32]         // Point of the icon that corresponds to marker's location
        });
        const startIcon = L.divIcon({
        html: '<img src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/svg/pin-sharp.svg" style="font-size: 32px; color: green;">',
        className: 'custom-div-icon', // Use this to remove default Leaflet styling
        iconSize: [32, 32],          // Match this to your font-size
        iconAnchor: [16, 32]         // Point of the icon that corresponds to marker's location
        });
        const endIcon = L.divIcon({
        html: '<ion-icon name="pin-sharp" style="font-size: 32px; color: red;"></ion-icon>',
        className: 'custom-div-icon', // Use this to remove default Leaflet styling
        iconSize: [32, 32],          // Match this to your font-size
        iconAnchor: [16, 32]         // Point of the icon that corresponds to marker's location
        });
        let allRoutes = [];
        // Load the JSON data
        fetch('routes.json')
            .then(response => response.json())
            .then(locations => {
                const listContainer = document.getElementById('route-list');
                locations.forEach(loc => {
                    // Prepare GPX track (hidden)
                    const gpxTrack = new L.GPX(`routes/${loc.gpx}`, {
                        async: true,
                        marker_options: { 
                            startIcon: startIcon,
                            endIcon: endIcon,
                            shadowIcon: null },
                        polyline_options: { color: '#6F2DA8', weight: 3 }
                    });

                    // Create marker for this location
                    const marker = L.marker(loc.coords, { icon: markerIcon }).addTo(map);
                    marker.bindPopup(`<b>${loc.name}</b><br>${loc.info}`);

                    // Hover interactions
                    marker.on('mouseover', () => gpxTrack.addTo(map));
                    marker.on('mouseout', () => map.removeLayer(gpxTrack));

                    // Create Sidebar Entry
                    const listItem = document.createElement('li');
                    listItem.innerHTML = `<strong>${loc.name}</strong><br><small>${loc.distance}</small>`;
                    listItem.style.cursor = "pointer";
                    listItem.style.marginBottom = "10px";
                    
                    // Interaction: Clicking sidebar name zooms map and opens popup
                    listItem.onclick = () => {
                        // Clear previous GPX tracks
                        map.eachLayer(layer => { if(layer instanceof L.GPX) map.removeLayer(layer); });

                        // Function to handle the actual zooming
                        const zoomToRoute = (track) => {
                            const bounds = track.getBounds();
                            const sidebar = document.getElementById('sidebar');
                            
                            // Check if sidebar is hidden by class OR by mobile media query
                            const isSidebarVisible = !sidebar.classList.contains('sidebar-hidden') && sidebar.offsetWidth > 0;

                            // Use fitBounds only, but with forced recalculation
                            map.fitBounds(bounds, {
                                paddingTopLeft: isSidebarVisible ? [310, 10] : [10, 10],
                                paddingBottomRight: [10, 10],
                                maxZoom: 15,
                                animate: true,
                                duration: 1.0,
                                noMoveStart: true // Prevents small jitters
                            });

                            // Open popup after the map has moved
                            marker.openPopup();
                        };
                        gpxTrack.addTo(map);

                        // If already loaded, zoom now. Otherwise, wait for the event.
                        if (gpxTrack.getBounds().isValid()) {
                            zoomToRoute(gpxTrack);
                        } else {
                            gpxTrack.on('loaded', (e) => zoomToRoute(e.target));
                        }
                    };

                    listContainer.appendChild(listItem);
                });
            })
            .catch(error => console.error('Error loading map data:', error));
    </script>
</body>
</html>
